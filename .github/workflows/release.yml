name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.2.0'
        required: true
        type: string
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            dist_script: dist:win
            artifacts: |
              release/FocusDo-*-Setup.exe
          - os: macos-latest
            label: macOS
            dist_script: dist:mac
            artifacts: |
              release/FocusDo-*.dmg
              release/FocusDo-*.zip
          - os: ubuntu-latest
            label: Linux
            dist_script: dist:linux
            artifacts: |
              release/FocusDo-*.AppImage
              release/FocusDo-*.deb

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: npm run build

      - name: Build installer
        run: npm run ${{ matrix.dist_script }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FocusDo-${{ matrix.label }}-${{ env.RELEASE_TAG }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: FocusDo ${{ env.RELEASE_TAG }}
          files: ${{ matrix.artifacts }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
